    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 45px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: 0.4s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffcc70;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
        }

        h2 {
            font-size: 18px;
            font-weight: 400;
            margin: 10px 0 20px;
            color: #ffcc70;
        }

        p {
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .buttons a {
            text-decoration: none;
            display: inline-block;
            margin: 8px;
            padding: 10px 20px;
            border-radius: 30px;
            background: #ffcc70;
            color: black;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .buttons a:hover {
            background: white;
            transform: scale(1.1);
        }

        footer {
            margin-top: 25px;
            font-size: 13px;
            opacity: 0.7;
        }
    </style>
</head>
